name: Deploy to InfinityFree

on:
  push:
    branches:
      - main  # Ganti dengan 'master' jika branch utama Anda bernama master

jobs:
  web-deploy:
    name: 🎉 Deploy Website via FTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📂 Sync files to InfinityFree
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: htdocs/ # Folder publik bawaan InfinityFree
        # Opsional: Jika Anda ingin mengecualikan folder/file tertentu dari deploy
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .github/workflows/**
